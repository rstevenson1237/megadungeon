<!-- index.html — complete game entry point -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MEGADUNGEON</title>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    touch-action: none; /* Prevent mobile zoom/scroll */
}
#game-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}
#main-canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    filter: brightness(1.5);
}
#crt-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
}
#minimap-canvas {
    position: absolute;
    top: 10px; right: 10px;
    opacity: 0.85;
    border: 1px solid #444;
    display: none;
}
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="main-canvas"></canvas>
    <canvas id="crt-canvas"></canvas>
    <canvas id="minimap-canvas"></canvas>
  </div>
  <script type="module" src="src/Game.js"></script>
</body>
</html>
